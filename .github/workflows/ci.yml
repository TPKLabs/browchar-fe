name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Al declarar permissions se pierden los defaults: packages:read es
# imprescindible para que npm resuelva @tpklabs/browchar-contracts
# (acceso otorgado al repo vía Manage Actions access del package).
permissions:
  contents: read
  packages: read

# Un push nuevo a la misma rama cancela la corrida anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # .npmrc referencia ${GITHUB_TOKEN}: sin la variable definida, cualquier
      # comando npm falla con "Failed to replace env in config".
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate de drift contra GitHub Packages (decisión 2026-07-16: fail duro —
      # un warning verde no se ve y se termina mergeando atrasado). Trade-off
      # asumido: un publish nuevo de contracts pone en rojo los PRs del FE
      # hasta que entre el bump del pin. Si el registry no responde, avisa y
      # sigue (no bloquear por un hiccup externo).
      - name: Check contracts package is up to date
        run: |
          LATEST=$(npm view @tpklabs/browchar-contracts version 2>/dev/null) || {
            echo "::warning::No se pudo consultar la última versión de @tpklabs/browchar-contracts en GitHub Packages — chequeo de frescura salteado."
            exit 0
          }
          INSTALLED=$(node -p "require('./node_modules/@tpklabs/browchar-contracts/package.json').version")
          PIN=$(node -p "require('./package.json').dependencies['@tpklabs/browchar-contracts']")
          if [ "$INSTALLED" = "$LATEST" ]; then
            echo "@tpklabs/browchar-contracts $INSTALLED instalado = última publicada."
          elif npx --yes semver --range "$PIN" "$LATEST" > /dev/null; then
            echo "::error::@tpklabs/browchar-contracts instalado en $INSTALLED pero la última publicada es $LATEST y el pin $PIN la admite — corré npm update @tpklabs/browchar-contracts y commiteá el lockfile."
            exit 1
          else
            echo "::error::Drift duro de @tpklabs/browchar-contracts: el pin $PIN NO admite la última publicada $LATEST (instalado: $INSTALLED). Bumpeá el pin en package.json y regenerá el lockfile."
            exit 1
          fi

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # --coverage aplica el thresholds de vitest.config.mts (DEV-37): la
      # corrida falla si la cobertura baja del umbral acordado.
      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # E2E (DEV-199): black-box con Playwright, red mockeada en el borde
      # (page.route, ver e2e/mocks.ts) — no depende de browchar-api ni de
      # Docker, así que no hace falta un job aparte como el e2e de la API.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      # Si el E2E falla, subir el reporte HTML + traces (trace: "on-first-retry"
      # en playwright.config.ts) para diagnosticar sin reproducir localmente.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
